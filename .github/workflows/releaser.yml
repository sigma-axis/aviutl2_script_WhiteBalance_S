name: Make Release
on:
  push:
    tags:
    - '*'

env:
  REPOSITORY_NAME: WhiteBalance_S

  TIME_ZONE: Asia/Tokyo
  # Time zone for the timestamp when releasing.

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Set package version
      run: |
        cd assets
        sed -i 's/\${ver}/${{ github.ref_name }}/g' package.ini

    - name: Pack and compress (AviUtl 1)
      run: |
        mkdir -p pack_au1
        cp *.anm pack_au1
        cp *.lua pack_au1
        cp *.frag pack_au1
        cp *.md pack_au1
        cp LICENSE pack_au1
        cd pack_au1
        zip -r ../aviutl_script_${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.zip *
      # rename .zip file for downloading if necessary.

    - name: Pack and compress (AviUtl 2)
      run: |
        mkdir -p pack_au2/Script/${{ env.REPOSITORY_NAME }}
        cp *.anm2 pack_au2/Script
        cp *.md pack_au2/Script/${{ env.REPOSITORY_NAME }}
        cp LICENSE pack_au2/Script/${{ env.REPOSITORY_NAME }}
        cp assets/package.txt pack_au2
        cp assets/package.ini pack_au2
        cd pack_au2
        zip -r ../aviutl2_script_${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.au2pkg.zip *
      # rename .zip file for downloading if necessary.

    - name: Prepare release notes
      id: release-notes
      run: |
        echo "name=${{ github.ref_name }} ($(TZ='${{ env.TIME_ZONE }}' date +'%Y-%m-%d'))" >> $GITHUB_OUTPUT
        echo '### ダウンロードするファイル' >> ReleaseNotes.txt
        echo '- AviUtl (無印) 版: `aviutl_script_${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.zip`' >> ReleaseNotes.txt
        echo '- AviUtl ExEdit2 版: `aviutl2_script_${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.au2pkg.zip`' >> ReleaseNotes.txt
        echo "### 更新内容" >> ReleaseNotes.txt
        phase=0
        IFS=$'\n'
        cat README.md | while read line; do
          if [[ $phase == 0 ]]; then
            if [[ $line =~ ^##*[[:space:]]{1,}'改版履歴'[[:space:]]*$ ]]; then phase=1; fi
          elif [[ $phase == 1 ]]; then
            if [[ $line =~ ^-[[:space:]] ]]; then phase=2; fi
          elif [[ $line =~ ^(-|##*)[[:space:]] ]]; then break
          else
            echo ${line:2} >> ReleaseNotes.txt
          fi
        done

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        name: ${{ steps.release-notes.outputs.name }}
        files: '*.zip'
        body_path: ReleaseNotes.txt
